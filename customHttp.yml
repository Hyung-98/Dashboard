# AWS Amplify Custom headers
# https://docs.aws.amazon.com/amplify/latest/userguide/custom-headers.html
# 프로젝트 루트에 두면 배포 시 적용됩니다.
#
# 1) Turnstile(CAPTCHA) iframe/script 허용
#    - "Blocked script execution in 'about:blank' because the document's frame is sandboxed and the 'allow-scripts' permission is not set"
#    - Cloudflare Turnstile 사용 시 frame-src, script-src에 challenges.cloudflare.com 필요
# 2) Supabase API 호출 허용 (connect-src)
# 3) Google Fonts (Inter) 허용
customHeaders:
  - pattern: "**"
    headers:
      - key: "Content-Security-Policy"
        value: "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; frame-src 'self' https://challenges.cloudflare.com; connect-src 'self' https://*.supabase.co https://*.supabase.in; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:;"
